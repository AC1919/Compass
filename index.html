<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compass — Sheffield Career Planning Guide</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0a1e;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
    }

    .wrapper {
      max-width: 520px;
      margin: 0 auto;
      padding: 12px;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #2d1b69 0%, #1a0f3d 100%);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-title {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .header-sub {
      font-size: 13px;
      color: #a78bfa;
      margin-top: 4px;
    }

    /* ── MASCOT + BUBBLE ── */
    .mascot-row {
      display: flex;
      gap: 16px;
      align-items: stretch;
      margin-bottom: 16px;
    }
    .mascot-box {
      background: #1e1340;
      border-radius: 14px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      flex-shrink: 0;
    }
    .mascot-svg { width: 90px; height: 110px; }
    .bubble-box {
      background: #fff;
      border-radius: 14px;
      padding: 18px 20px;
      flex: 1;
      display: flex;
      align-items: center;
    }
    .bubble-text {
      font-size: 15px;
      color: #1a1a2e;
      line-height: 1.6;
    }

    /* ── DROPDOWNS ── */
    .dropdown-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .dropdown-wrap select {
      width: 100%;
      padding: 16px 44px 16px 18px;
      border-radius: 12px;
      border: 1.5px solid #3d2a7a;
      background: #fff;
      color: #1a1a2e;
      font-size: 15px;
      appearance: none;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    .dropdown-wrap select:focus { border-color: #7c3aed; }
    .dropdown-arrow {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #7c3aed;
      font-size: 18px;
      pointer-events: none;
    }

    /* ── CONTENT AREA ── */
    .content-area {
      display: none;
      margin-top: 16px;
      animation: fadeIn 0.3s ease;
    }
    .content-area.show { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── STAGE HEADER ── */
    .stage-header {
      background: linear-gradient(135deg, #2d1b69, #1a0f3d);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 14px;
    }
    .stage-num {
      font-size: 11px;
      font-weight: 600;
      color: #a78bfa;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .stage-title {
      font-size: 19px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .stage-desc {
      font-size: 13px;
      color: #c4b5fd;
      line-height: 1.5;
    }

    /* ── SQUIG NOTE ── */
    .squig {
      background: #1a2e1a;
      border-left: 3px solid #4ade80;
      border-radius: 0 10px 10px 0;
      padding: 12px 14px;
      margin-bottom: 14px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .squig-icon { font-size: 18px; flex-shrink: 0; }
    .squig-text { font-size: 13px; color: #86efac; line-height: 1.5; }

    /* ── REFLECT QUESTIONS ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #a78bfa;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .reflect-q {
      background: #1e1340;
      border-left: 3px solid #7c3aed;
      border-radius: 0 8px 8px 0;
      padding: 10px 14px;
      font-size: 13px;
      color: #ddd6fe;
      line-height: 1.5;
      margin-bottom: 7px;
    }

    /* ── RESOURCE CARDS ── */
    .res-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 4px;
    }
    .res-card {
      background: #1e1340;
      border: 1px solid #3d2a7a;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-decoration: none;
      display: block;
    }
    .res-card:hover {
      border-color: #7c3aed;
      background: #261852;
    }
    .res-icon { font-size: 20px; margin-bottom: 5px; }
    .res-name {
      font-size: 13px;
      font-weight: 600;
      color: #e9d5ff;
      line-height: 1.3;
    }
    .res-desc {
      font-size: 11px;
      color: #a78bfa;
      margin-top: 3px;
      line-height: 1.4;
    }

    /* ── MYTHBUSTING ── */
    .myth-label {
      font-size: 11px;
      font-weight: 600;
      color: #fb923c;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 14px 0 8px;
    }
    .myth-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #2a1a0a;
      border: 1px solid #92400e;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12px;
      color: #fdba74;
      margin: 0 5px 6px 0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .myth-chip:hover { background: #3a2010; }
    .myth-chip-x {
      color: #f97316;
      font-weight: 700;
      font-size: 13px;
    }
    .myth-pop {
      background: #1f1208;
      border: 1px solid #92400e;
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 6px;
      font-size: 13px;
      color: #fed7aa;
      line-height: 1.6;
      display: none;
    }
    .myth-pop.show { display: block; }
    .myth-pop strong {
      display: block;
      color: #fb923c;
      font-weight: 600;
      margin-bottom: 3px;
    }

    /* ── FOOTER NAV ── */
    .footer-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0 0;
      margin-top: 4px;
      border-top: 1px solid #2d1b69;
    }
    .footer-home {
      font-size: 13px;
      color: #a78bfa;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
    }
    .footer-brand { font-size: 13px; color: #a78bfa; font-weight: 600; }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      background: linear-gradient(90deg, #1a0f3d, #2d1b69);
      border-radius: 0 0 14px 14px;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
    }
    .bottom-bar span {
      font-size: 13px;
      color: #c4b5fd;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── LOADING / ERROR ── */
    .state-msg {
      text-align: center;
      padding: 2rem;
      color: #a78bfa;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="header-title" id="app-name">Compass</div>
    <div class="header-sub" id="app-tagline">Your Sheffield Career Planning Guide</div>
  </div>

  <!-- MASCOT + BUBBLE -->
  <div class="mascot-row">
    <div class="mascot-box">
      <svg class="mascot-svg" viewBox="0 0 90 110" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="20" y="55" width="50" height="42" rx="12" fill="#4c1d95"/>
        <rect x="32" y="68" width="26" height="18" rx="4" fill="#6d28d9"/>
        <text x="45" y="81" text-anchor="middle" font-size="7" fill="#c4b5fd" font-weight="700">Sheffield</text>
        <rect x="4"  y="58" width="16" height="9" rx="5" fill="#4c1d95"/>
        <rect x="70" y="58" width="16" height="9" rx="5" fill="#4c1d95"/>
        <circle cx="76" cy="54" r="5" fill="#ddd6fe"/>
        <circle cx="45" cy="35" r="24" fill="#ede9fe"/>
        <line x1="45" y1="11" x2="45" y2="4" stroke="#7c3aed" stroke-width="2"/>
        <circle cx="45" cy="3"  r="3"   fill="#c084fc"/>
        <circle cx="37" cy="33" r="7"   fill="#1a1a2e"/>
        <circle cx="53" cy="33" r="7"   fill="#1a1a2e"/>
        <circle cx="39" cy="31" r="3"   fill="#a78bfa"/>
        <circle cx="55" cy="31" r="3"   fill="#a78bfa"/>
        <circle cx="40" cy="30" r="1.5" fill="#fff"/>
        <circle cx="56" cy="30" r="1.5" fill="#fff"/>
        <path d="M37 42 Q45 48 53 42" stroke="#7c3aed" stroke-width="2" fill="none" stroke-linecap="round"/>
        <rect x="28" y="95" width="12" height="12" rx="4" fill="#3b0764"/>
        <rect x="50" y="95" width="12" height="12" rx="4" fill="#3b0764"/>
      </svg>
    </div>
    <div class="bubble-box">
      <p class="bubble-text" id="bubble-msg">Loading…</p>
    </div>
  </div>

  <!-- STAGE DROPDOWN -->
  <div class="dropdown-wrap">
    <select id="stage-select" onchange="onStageChange()" disabled>
      <option value="">Select Stage</option>
    </select>
    <div class="dropdown-arrow">▾</div>
  </div>

  <!-- TOPIC DROPDOWN -->
  <div class="dropdown-wrap" id="topic-wrap" style="display:none;">
    <select id="topic-select" onchange="onTopicChange()">
      <option value="">Select Focus Area</option>
    </select>
    <div class="dropdown-arrow">▾</div>
  </div>

  <!-- CONTENT AREA -->
  <div class="content-area" id="content-area"></div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <span onclick="resetAll()">🏠 Home</span>
    <span id="footer-brand">Careers &amp; Employability Service</span>
  </div>

</div>

<script>
  let appData = null;
  let activeStage = null;

  /* ── Load data.json ── */
  fetch('data.json')
    .then(r => {
      if (!r.ok) throw new Error('Could not load data.json');
      return r.json();
    })
    .then(json => {
      appData = json;
      init();
    })
    .catch(err => {
      document.getElementById('bubble-msg').innerHTML =
        '⚠️ Could not load content. Make sure <code>data.json</code> is in the same folder as this file.';
      console.error(err);
    });

  /* ── Populate app shell from JSON ── */
  function init() {
    const { app, stages } = appData;

    document.title                          = `${app.name} — ${app.tagline}`;
    document.getElementById('app-name').textContent    = `${app.name}`;
    document.getElementById('app-tagline').textContent = app.tagline;
    document.getElementById('footer-brand').textContent = app.footer;
    document.getElementById('bubble-msg').innerHTML    = app.defaultBubble;

    const stageSel = document.getElementById('stage-select');
    stages.forEach(s => {
      const opt = document.createElement('option');
      opt.value       = s.id;
      opt.textContent = `${s.emoji} ${s.label}`;
      stageSel.appendChild(opt);
    });
    stageSel.disabled = false;
  }

  /* ── Stage dropdown changed ── */
  function onStageChange() {
    const stageId = document.getElementById('stage-select').value;
    clearContent();

    if (!stageId) {
      document.getElementById('topic-wrap').style.display = 'none';
      document.getElementById('bubble-msg').innerHTML = appData.app.defaultBubble;
      return;
    }

    activeStage = appData.stages.find(s => s.id === stageId);
    document.getElementById('bubble-msg').innerHTML = activeStage.bubble;

    const topicSel = document.getElementById('topic-select');
    topicSel.innerHTML = '<option value="">Select Focus Area</option>';
    activeStage.topics.forEach(t => {
      const opt = document.createElement('option');
      opt.value       = t.id;
      opt.textContent = t.label;
      topicSel.appendChild(opt);
    });

    document.getElementById('topic-wrap').style.display = 'block';
  }

  /* ── Topic dropdown changed ── */
  function onTopicChange() {
    const topicId = document.getElementById('topic-select').value;
    clearContent();
    if (!topicId || !activeStage) return;

    const topic = activeStage.topics.find(t => t.id === topicId);
    renderContent(topic);
  }

  /* ── Render a topic page ── */
  function renderContent(topic) {
    const squigParts = topic.squig.split(' ');
    const squigIcon  = squigParts[0];
    const squigText  = squigParts.slice(1).join(' ');

    const reflectsHTML = topic.reflects
      .map(q => `<div class="reflect-q">${q}</div>`)
      .join('');

    const resourcesHTML = topic.resources
      .map(r => {
        const href = r.url && r.url !== '#' ? `href="${r.url}" target="_blank" rel="noopener"` : '';
        return `
          <a class="res-card" ${href}>
            <div class="res-icon">${r.icon}</div>
            <div class="res-name">${r.name}</div>
            <div class="res-desc">${r.desc}</div>
          </a>`;
      })
      .join('');

    let mythsHTML = '';
    if (topic.myths && topic.myths.length) {
      const chips = topic.myths
        .map((m, i) => `
          <button class="myth-chip" onclick="toggleMyth('myth_${i}')" aria-expanded="false" aria-controls="myth_${i}">
            <span class="myth-chip-x" aria-hidden="true">✕</span> ${m.chip}
          </button>`)
        .join('');
      const pops = topic.myths
        .map((m, i) => `
          <div class="myth-pop" id="myth_${i}" role="region">
            <strong>Busted.</strong> ${m.bust}
          </div>`)
        .join('');
      mythsHTML = `
        <div class="myth-label">Mythbusting</div>
        <div>${chips}</div>
        ${pops}`;
    }

    document.getElementById('content-area').innerHTML = `
      <div class="stage-header">
        <div class="stage-num">${topic.stageNum}</div>
        <div class="stage-title">${topic.title}</div>
        <div class="stage-desc">${topic.desc}</div>
      </div>

      <div class="squig">
        <span class="squig-icon">${squigIcon}</span>
        <span class="squig-text">${squigText}</span>
      </div>

      <div class="section-label">Questions to reflect on</div>
      ${reflectsHTML}

      <div class="section-label" style="margin-top:14px;">Resources to explore</div>
      <div class="res-grid">${resourcesHTML}</div>

      ${mythsHTML}

      <div class="footer-nav">
        <button class="footer-home" onclick="resetAll()">🏠 Home</button>
        <span class="footer-brand">${appData.app.footer}</span>
      </div>
    `;

    document.getElementById('content-area').classList.add('show');
  }

  /* ── Toggle myth busting pop ── */
  function toggleMyth(id) {
    const el  = document.getElementById(id);
    const btn = el.previousElementSibling
      ? null
      : document.querySelector(`[aria-controls="${id}"]`);
    el.classList.toggle('show');
    if (btn) btn.setAttribute('aria-expanded', el.classList.contains('show'));
  }

  /* ── Reset everything ── */
  function resetAll() {
    document.getElementById('stage-select').value = '';
    document.getElementById('topic-wrap').style.display = 'none';
    clearContent();
    document.getElementById('bubble-msg').innerHTML = appData.app.defaultBubble;
    activeStage = null;
  }

  /* ── Clear content area ── */
  function clearContent() {
    const ca = document.getElementById('content-area');
    ca.classList.remove('show');
    ca.innerHTML = '';
  }
</script>
</body>
</html>
